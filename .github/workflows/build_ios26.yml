name: Build Play! iOS 26

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Install Dependencies
        run: brew install cmake ninja

      - name: Setup Vulkan SDK
        run: |
          VULKAN_SDK_VERSION=1.3.290.0
          curl -L "https://sdk.lunarg.com/sdk/download/${VULKAN_SDK_VERSION}/mac/vulkansdk-macos-${VULKAN_SDK_VERSION}.zip" -o vulkan.zip
          unzip -q vulkan.zip
          # On définit la variable pour CMake
          echo "VULKAN_SDK=$GITHUB_WORKSPACE/vulkansdk-macos-${VULKAN_SDK_VERSION}/iOS" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          mkdir build
          cmake -S . -B build \
            -G Xcode \
            -DCMAKE_TOOLCHAIN_FILE=deps/Dependencies/cmake-ios/ios.cmake \
            -DPLATFORM=OS64 \
            -DENABLE_BITCODE=OFF \
            -DCMAKE_PREFIX_PATH=$VULKAN_SDK

      - name: Build
        run: |
          cmake --build build --config Release --target Play

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/Source/ui_ios/Release-iphoneos/Play.app Payload/
          zip -r Play_iOS_26.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Play-iOS-26-Build
          path: Play_iOS_26.ipa
