name: Build Play! iOS 26 Final
on: [push, workflow_dispatch]

jobs:
  build_ios:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Install Tools
        run: brew install cmake ninja dpkg

      - name: Setup Vulkan SDK
        run: |
          VULKAN_SDK_VERSION=1.3.290.0
          curl -L "https://sdk.lunarg.com/sdk/download/${VULKAN_SDK_VERSION}/mac/vulkansdk-macos-${VULKAN_SDK_VERSION}.zip?Human=true" -o vulkan.zip
          unzip -q vulkan.zip
          echo "VULKAN_SDK=$GITHUB_WORKSPACE/vulkansdk-macos-${VULKAN_SDK_VERSION}/iOS" >> $GITHUB_ENV

      - name: Configure & Build
        run: |
          mkdir build && cd build
          cmake .. -G"Xcode" -DCMAKE_TOOLCHAIN_FILE=../deps/Dependencies/cmake-ios/ios.cmake -DTARGET_IOS=ON -DCMAKE_PREFIX_PATH=$VULKAN_SDK
          cmake --build . --config Release --target Play

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/Source/ui_ios/Release-iphoneos/Play.app Payload/
          zip -r Play_iOS_26.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Play_IPA_Final
          path: Play_iOS_26.ipa
